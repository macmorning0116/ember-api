spring:
  application:
    name: api

  datasource:
    url: jdbc:postgresql://localhost:5433/ember
    driver-class-name: org.postgresql.Driver
    username: fishing
    password: fishing

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:default}
            client-secret: ${GOOGLE_CLIENT_SECRET:default}
            scope: email, profile

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production-please}
  access-expiration: 3600000
  refresh-expiration: 604800000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
